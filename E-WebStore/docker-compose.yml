version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./src:/app/src
    command: npm run dev

  # Optional: Add your backend API service here
  # api:
  #   image: your-api-image
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - DATABASE_URL=postgres://...
